<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Autobuses</title>
    <style>
        /* Estilos generales */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f4f7f6; 
            color: #333;
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        /* Estilos del formulario */
        form { 
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 15px; 
            margin-bottom: 30px; 
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 6px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        input { 
            padding: 10px; 
            font-size: 15px; 
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        button { 
            padding: 12px; 
            font-size: 16px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px; 
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover { 
            background-color: #2980b9; 
        }

        /* Estilos de la tabla */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
        }
        th, td { 
            padding: 12px 15px; 
            border-bottom: 1px solid #ddd; 
            text-align: left; 
        }
        th { 
            background-color: #2c3e50; 
            color: white; 
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        
        /* Botones de acción (para uso futuro en JS) */
        .btn-edit { background-color: #27ae60; padding: 6px 12px; font-size: 14px; }
        .btn-edit:hover { background-color: #2ecc71; }
        .btn-delete { background-color: #c0392b; padding: 6px 12px; font-size: 14px;}
        .btn-delete:hover { background-color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro y Control de Autobuses</h2>
    
    <form id="busForm">
        <input type="hidden" id="busId">
        <div class="form-group">
            <label for="placa">Placa del Autobús:</label>
            <input type="text" id="placa" placeholder="Ej. A123456" required>
        </div>
        <div class="form-group">
            <label for="marca">Marca / Modelo:</label>
            <input type="text" id="marca" placeholder="Ej. Mercedes-Benz" required>
        </div>
        <div class="form-group full-width">
            <label for="capacidad">Capacidad de pasajeros:</label>
            <input type="number" id="capacidad" placeholder="Ej. 50" required>
        </div>
        <div class="form-group full-width">
            <button type="submit" id="submitBtn">Guardar Registro</button>
        </div>
    </form>

    <table>
        <thead>
            <tr>
                <th>Placa</th>
                <th>Marca</th>
                <th>Capacidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="busTableBody">
            <tr>
                <td>Z987654</td>
                <td>Volvo 9800</td>
                <td>45</td>
                <td>
                    <button class="btn-edit" type="button">Editar</button>
                    <button class="btn-delete" type="button">Eliminar</button>
                </td>
            </tr>
       <tbody id="busTableBody">
            </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
